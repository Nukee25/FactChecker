version: "3.9"

services:
  backend:
    image: python:3.11-slim
    container_name: factchecker-backend
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    networks:
      - private
      - publicweb

  frontend:
    image: node:20-alpine
    container_name: factchecker-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - private
      - publicweb

networks:
  private:
  publicweb:
    external: true
